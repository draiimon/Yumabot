# Fast Render deploy (same pattern as OSA Transaction Guide Portal):
# - Native Node runtime (no Docker image build)
# - npm install only — typically deploys in ~1–2 minutes
# - TTS uses edge-tts-universal in Node (no Python required)
#
# Use this when you want quick pushes. Use render.yaml for the Docker setup.

services:
  - type: web
    name: janjanbot
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --omit=dev --no-fund --no-audit
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEB_ENABLED
        value: "true"
      - key: RAG_ENABLED
        value: "true"
      - key: GEMINI_EMBED_MODEL
        value: gemini-embedding-001
      - key: GEMINI_EMBED_DIMENSIONS
        value: "768"
      - key: GOOGLE_API_KEY_10
        sync: false
      - key: GOOGLE_API_KEY_11
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SELF_PING_ENABLED
        value: "false"
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY1
        sync: false
      - key: GROQ_API_KEY2
        sync: false
      - key: GROQ_API_KEY3
        sync: false
      - key: GROQ_API_KEY4
        sync: false
      - key: GROQ_API_KEY5
        sync: false
      - key: GROQ_API_KEY6
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: LEONARDO_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BUDGET_TOKENS
        value: "5000000"
      - key: SESSION_SECRET
        sync: false
